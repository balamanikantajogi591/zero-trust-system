# Spring Datasource & JPA Configuration (H2 In-Memory Database)
spring.datasource.url=jdbc:h2:mem:zerotrustdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Redis Configuration (Used for session/caching if needed)
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.username=${REDISUSER:default}

# Security Configuration
application.security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Logging
logging.level.org.springframework.security=DEBUG

# Server Port
server.port=${PORT:8080}

# ML Service Configuration
application.ml-service.url=${APPLICATION_ML_SERVICE_URL:http://localhost:8000}


version: '3.8'

services:
#   postgres:
#     image: postgres:15
#     environment:
#       POSTGRES_DB: zerotrust
#       POSTGRES_USER: admin
#       POSTGRES_PASSWORD: password
#     ports:
#       - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
#       SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zerotrust
#       SPRING_DATASOURCE_USERNAME: admin
#       SPRING_DATASOURCE_PASSWORD: password
      SPRING_REDIS_HOST: redis
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT}
    depends_on:
#       - postgres
      - redis

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
